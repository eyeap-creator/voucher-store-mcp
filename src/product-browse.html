<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>VoucherVault – Browse</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a38;
    --accent: #7c5cfc;
    --accent2: #fc5c7d;
    --gold: #f5c518;
    --text: #f0f0f8;
    --muted: #7a7a9a;
    --green: #2dcc70;
    --red: #fc5c5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #0e0e1a 0%, #16102e 100%);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky; top: 0; z-index: 10;
  }
  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 18px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  .header-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .cart-badge {
    background: var(--accent);
    color: white;
    font-size: 11px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 20px;
    font-family: 'Syne', sans-serif;
  }

  /* Filter tabs */
  .filters {
    padding: 14px 20px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .filter-btn.active, .filter-btn:hover {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* Products grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 14px;
    padding: 16px 20px;
  }

  /* Product card */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    cursor: pointer;
    position: relative;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 40px rgba(124,92,252,0.25);
    border-color: var(--accent);
  }

  /* Discount badge */
  .badge-discount {
    position: absolute;
    top: 10px; right: 10px;
    background: var(--accent2);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 3px 9px;
    border-radius: 20px;
    z-index: 2;
  }

  /* Card image area */
  .card-visual {
    height: 100px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    position: relative;
    overflow: hidden;
  }
  .card-visual::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 50%, var(--card) 100%);
  }

  .card-body { padding: 12px 14px 14px; }
  .card-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 14px;
    margin-bottom: 4px;
    line-height: 1.3;
  }
  .card-category {
    font-size: 11px;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Rating row */
  .rating-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .stars { color: var(--gold); font-size: 11px; letter-spacing: 1px; }
  .rating-val { font-size: 12px; font-weight: 500; }
  .sold-count { font-size: 11px; color: var(--muted); margin-left: auto; }

  /* Price row */
  .price-row {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    margin-bottom: 10px;
  }
  .price-sale {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: var(--accent);
  }
  .price-ori {
    font-size: 12px;
    color: var(--muted);
    text-decoration: line-through;
  }

  /* Competitor row */
  .competitor-row {
    background: rgba(253,92,93,0.08);
    border: 1px solid rgba(253,92,93,0.2);
    border-radius: 8px;
    padding: 6px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .comp-label { font-size: 10px; color: var(--muted); }
  .comp-price { font-size: 12px; color: var(--red); font-weight: 600; }
  .comp-save { font-size: 10px; color: var(--green); font-weight: 600; }

  /* Buy button */
  .btn-buy {
    width: 100%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, var(--accent), #9d7cfc);
    color: white;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.3px;
  }
  .btn-buy:hover { opacity: 0.9; }
  .btn-buy:active { transform: scale(0.98); }

  /* Selected state */
  .card.selected {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px var(--accent), 0 12px 40px rgba(124,92,252,0.35);
  }
  .card.selected .btn-buy {
    background: linear-gradient(135deg, var(--green), #27a960);
  }

  /* Confirm bar */
  .confirm-bar {
    position: sticky;
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 80%, transparent);
    padding: 16px 20px;
    display: none;
    animation: slideUp 0.3s ease;
  }
  .confirm-bar.visible { display: block; }
  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
  .confirm-inner {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .confirm-info { font-size: 13px; }
  .confirm-name { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 14px; }
  .confirm-price { font-size: 12px; opacity: 0.85; margin-top: 2px; }
  .btn-confirm {
    background: white;
    color: var(--accent);
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
  }

  /* Empty / loading state */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <div>
    <div class="logo">⚡ VoucherVault</div>
    <div class="header-sub">Digital vouchers · Instant delivery</div>
  </div>
  <div class="cart-badge" id="cartBadge">0 selected</div>
</div>

<div class="filters">
  <button class="filter-btn active" data-cat="all">All</button>
  <button class="filter-btn" data-cat="streaming">Streaming</button>
  <button class="filter-btn" data-cat="gaming">Gaming</button>
  <button class="filter-btn" data-cat="shopping">Shopping</button>
  <button class="filter-btn" data-cat="food">Food & Dining</button>
  <button class="filter-btn" data-cat="travel">Travel</button>
</div>

<div class="grid" id="productGrid"></div>

<div class="confirm-bar" id="confirmBar">
  <div class="confirm-inner">
    <div class="confirm-info">
      <div class="confirm-name" id="confirmName">–</div>
      <div class="confirm-price" id="confirmPrice">–</div>
    </div>
    <button class="btn-confirm" id="confirmBtn">Proceed to Pay →</button>
  </div>
</div>

<script>
const PRODUCTS = [
  { id: 1, name: "Netflix Premium 1-Month", category: "streaming", emoji: "🎬",
    oriPrice: 59.90, discountPrice: 42.00, discountTag: "30% OFF", competitorPrice: 55.00,
    rating: 4.8, amountSold: 12400,
    bg: "linear-gradient(135deg,#141414,#831010)" },
  { id: 2, name: "Spotify Premium 3-Month", category: "streaming", emoji: "🎵",
    oriPrice: 45.00, discountPrice: 33.00, discountTag: "27% OFF", competitorPrice: 42.00,
    rating: 4.7, amountSold: 9820,
    bg: "linear-gradient(135deg,#0d1a10,#1db954)" },
  { id: 3, name: "Disney+ Hotstar Annual", category: "streaming", emoji: "✨",
    oriPrice: 119.00, discountPrice: 79.00, discountTag: "34% OFF", competitorPrice: 99.00,
    rating: 4.5, amountSold: 7340,
    bg: "linear-gradient(135deg,#001f5e,#0063e5)" },
  { id: 4, name: "Steam Wallet RM50", category: "gaming", emoji: "🎮",
    oriPrice: 50.00, discountPrice: 44.50, discountTag: "11% OFF", competitorPrice: 49.00,
    rating: 4.9, amountSold: 23100,
    bg: "linear-gradient(135deg,#0e1523,#1b2838)" },
  { id: 5, name: "Razer Gold RM100", category: "gaming", emoji: "🟢",
    oriPrice: 100.00, discountPrice: 88.00, discountTag: "12% OFF", competitorPrice: 95.00,
    rating: 4.6, amountSold: 15620,
    bg: "linear-gradient(135deg,#0d1a0d,#44d62c)" },
  { id: 6, name: "Garena Shells 1650", category: "gaming", emoji: "💎",
    oriPrice: 28.00, discountPrice: 21.90, discountTag: "22% OFF", competitorPrice: 26.00,
    rating: 4.7, amountSold: 31800,
    bg: "linear-gradient(135deg,#1a0a0a,#e8171e)" },
  { id: 7, name: "Lazada RM30 Voucher", category: "shopping", emoji: "🛍️",
    oriPrice: 30.00, discountPrice: 24.00, discountTag: "20% OFF", competitorPrice: 29.00,
    rating: 4.4, amountSold: 18900,
    bg: "linear-gradient(135deg,#1a0525,#ff6900)" },
  { id: 8, name: "Shopee RM50 Voucher", category: "shopping", emoji: "🧧",
    oriPrice: 50.00, discountPrice: 41.00, discountTag: "18% OFF", competitorPrice: 47.50,
    rating: 4.5, amountSold: 22400,
    bg: "linear-gradient(135deg,#1a0808,#f5452d)" },
  { id: 9, name: "GrabFood RM20 Credit", category: "food", emoji: "🍜",
    oriPrice: 20.00, discountPrice: 15.50, discountTag: "22% OFF", competitorPrice: 19.00,
    rating: 4.6, amountSold: 14700,
    bg: "linear-gradient(135deg,#1a1208,#00b14f)" },
  { id: 10, name: "Foodpanda RM15 Credit", category: "food", emoji: "🐼",
    oriPrice: 15.00, discountPrice: 11.80, discountTag: "21% OFF", competitorPrice: 14.00,
    rating: 4.3, amountSold: 9200,
    bg: "linear-gradient(135deg,#1a0814,#d70f64)" },
  { id: 11, name: "AirAsia BIG Points 2000", category: "travel", emoji: "✈️",
    oriPrice: 40.00, discountPrice: 29.90, discountTag: "25% OFF", competitorPrice: 37.00,
    rating: 4.2, amountSold: 5600,
    bg: "linear-gradient(135deg,#1a0808,#e21836)" },
  { id: 12, name: "Agoda Credits USD10", category: "travel", emoji: "🏨",
    oriPrice: 47.00, discountPrice: 37.00, discountTag: "21% OFF", competitorPrice: 44.00,
    rating: 4.4, amountSold: 4120,
    bg: "linear-gradient(135deg,#080a1a,#eb1d36)" },
];

let selectedProduct = null;
let activeCategory = 'all';

function formatMYR(val) {
  return 'RM ' + val.toFixed(2);
}

function starString(rating) {
  const full = Math.round(rating);
  return '★'.repeat(full) + '☆'.repeat(5 - full);
}

function formatSold(n) {
  if (n >= 1000) return (n / 1000).toFixed(1) + 'k sold';
  return n + ' sold';
}

function savings(competitor, sale) {
  const diff = competitor - sale;
  if (diff <= 0) return null;
  return 'Save ' + formatMYR(diff) + ' vs competitor';
}

function renderProducts(cat) {
  const grid = document.getElementById('productGrid');
  const items = cat === 'all' ? PRODUCTS : PRODUCTS.filter(p => p.category === cat);
  if (items.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div>No vouchers in this category yet.</div>`;
    return;
  }
  grid.innerHTML = items.map(p => {
    const save = savings(p.competitorPrice, p.discountPrice);
    const isSelected = selectedProduct && selectedProduct.id === p.id;
    return `
    <div class="card ${isSelected ? 'selected' : ''}" data-id="${p.id}">
      <div class="badge-discount">${p.discountTag}</div>
      <div class="card-visual" style="background: ${p.bg}">${p.emoji}</div>
      <div class="card-body">
        <div class="card-category">${p.category}</div>
        <div class="card-name">${p.name}</div>
        <div class="rating-row">
          <span class="stars">${starString(p.rating)}</span>
          <span class="rating-val">${p.rating}</span>
          <span class="sold-count">${formatSold(p.amountSold)}</span>
        </div>
        <div class="price-row">
          <span class="price-sale">${formatMYR(p.discountPrice)}</span>
          <span class="price-ori">${formatMYR(p.oriPrice)}</span>
        </div>
        ${save ? `<div class="competitor-row">
          <span class="comp-label">Competitor: ${formatMYR(p.competitorPrice)}</span>
          <span class="comp-save">${save}</span>
        </div>` : ''}
        <button class="btn-buy" data-id="${p.id}">
          ${isSelected ? '✓ Selected' : 'Buy Now'}
        </button>
      </div>
    </div>`;
  }).join('');

  // Attach click handlers
  grid.querySelectorAll('.btn-buy').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const id = parseInt(btn.dataset.id);
      selectProduct(id);
    });
  });
}

function selectProduct(id) {
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) return;
  selectedProduct = selectedProduct && selectedProduct.id === id ? null : product;

  // Update confirm bar
  const bar = document.getElementById('confirmBar');
  const badge = document.getElementById('cartBadge');
  if (selectedProduct) {
    document.getElementById('confirmName').textContent = selectedProduct.name;
    document.getElementById('confirmPrice').textContent = formatMYR(selectedProduct.discountPrice);
    bar.classList.add('visible');
    badge.textContent = '1 selected';
  } else {
    bar.classList.remove('visible');
    badge.textContent = '0 selected';
  }

  renderProducts(activeCategory);
}

document.getElementById('confirmBtn').addEventListener('click', () => {
  if (!selectedProduct) return;
  // Signal to parent / MCP host via postMessage
  window.parent.postMessage({
    type: 'VOUCHER_PURCHASE_INTENT',
    product: selectedProduct
  }, '*');
  // Also dispatch custom event for Apps SDK callTool if available
  if (window.openai && window.openai.callTool) {
    window.openai.callTool('initiate_payment', { productId: selectedProduct.id, productName: selectedProduct.name, price: selectedProduct.discountPrice });
  }
  alert(`Proceeding to payment for: ${selectedProduct.name}\n\nPrice: RM ${selectedProduct.discountPrice.toFixed(2)}\n\n(In a full deployment, the payment widget would open here.)`);
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    renderProducts(activeCategory);
  });
});

renderProducts('all');
</script>
</body>
</html>
